<!DOCTYPE html>
<lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - KAZAKHSTAN</title>
    <link rel="stylesheet" href="style3.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="main-wrapper">
    <div class="checkout-container">
        
        <div class="sidebar-order">
            <img src="logo.png.jpeg.jpeg" alt="Logo" class="mini-logo">
            <h3>Your Order</h3>
            <div id="selected-items-list">
                <div class="order-item"><i>Aucun produit sélectionné</i></div>
            </div>
            <div class="total-big">
                <span id="total-val">0</span>$
            </div>
            <p class="secure-text">100% Secure Payment</p>
        </div>

        <div class="payment-area">
            <h3>Payment Information</h3>
            <form id="finalPaymentForm">
                <div class="input-group">
                    <label>Full name</label>
                    <input type="text" id="fullname" placeholder="Ex. Jean Dupont" required>
                </div>

                <div class="input-group">
                    <label>Telephone (Mobile Money)</label>
                    <input type="tel" id="phone" placeholder="+243..." required>
                </div>

                <div class="input-group">
                    <label>Payment method</label>
                    <select id="operator" required>
                        <option value="M-Pesa">M-Pesa (Vodacom)</option>
                        <option value="Airtel Money">Airtel Money</option>
                        <option value="Orange Money">Orange Money</option>
                    </select>
                </div>

                <button type="submit" class="btn-pay">Confirm purchase</button>
                <p id="total-label" class="total-summary">Total: 0 $</p>
            </form>
        </div>

        <div class="other-products">
            <h3>Other Products</h3>
            <div class="product-list" id="market-list">
                </div>
        </div>
    </div>
</div>

<div id="confirmationOverlay" class="overlay" style="display:none;">
    <div class="success-card">
        <div class="icon-check">✔</div>
        <h2>Paiement Réussi !</h2>
        <p id="confirmationMessage"></p>
        <button onclick="window.location.href='index.html'" class="btn-pay">Retour à l'accueil</button>
    </div>
</div>

<script>
/* 🔑 CONFIG SUPABASE */
const SUPABASE_URL = "https://scmxpvachhjleicpaync.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjbXhwdmFjaGhqbGVpY3BheW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5Mjg5NzYsImV4cCI6MjA4NDUwNDk3Nn0.XCk-qAWqKt1W5xDI-fnIEvj9KYta9ZzR2mUfFjj6ms4";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const catalogue = [
    { name: "Power Bank", price: 20, img: "https://i.pinimg.com/736x/2c/5b/01/2c5b015bd65230044dfd395241a2defb.jpg" },
    { name: "Support ventouse", price: 25, img: "https://i.pinimg.com/1200x/e2/64/df/e264dff1499ec70a6f2009f65197e3c7.jpg" },
    { name: "Ceinture en cuir", price: 2.5, img: "https://i.pinimg.com/1200x/ce/29/1c/ce291c659a747233c14d457929a0ba0c.jpg" },
    { name: "Sac bandoulière", price: 5, img: "https://i.pinimg.com/736x/26/66/f3/2666f3f72ee6c8447c9b33fc9b09a8a7.jpg" },
    { name: "Trépied selfie", price: 18, img: "https://i.pinimg.com/1200x/03/aa/82/03aa828194785d9e9159e304ec36e012.jpg" }
];

let selectedItems = [];
let totalGlobal = 0;

// Affichage initial
window.onload = function() {
    const marketList = document.getElementById('market-list');
    catalogue.forEach(prod => {
        marketList.innerHTML += `
            <div class="p-item">
                <img src="${prod.img}" alt="">
                <div class="p-info"><strong>${prod.name}</strong><br>$${prod.price}</div>
                <button class="ok-badge" onclick="ajouterProduit('${prod.name}', ${prod.price})">OK</button>
            </div>`;
    });

    // Vérifier si un produit vient de l'index
    const params = new URLSearchParams(window.location.search);
    if(params.get("item")) {
        ajouterProduit(params.get("item"), parseFloat(params.get("price")));
    }
};

function ajouterProduit(nom, prix) {
    selectedItems.push({ nom, prix });
    totalGlobal += prix;
    updateUI();
}

function updateUI() {
    const listDiv = document.getElementById('selected-items-list');
    listDiv.innerHTML = "";
    selectedItems.forEach(item => {
        listDiv.innerHTML += `<div class="order-item"><span>${item.nom}</span><span>$${item.prix}</span></div>`;
    });
    document.getElementById('total-val').innerText = totalGlobal;
    document.getElementById('total-label').innerText = "Total: " + totalGlobal + " $";
}

document.getElementById("finalPaymentForm").addEventListener("submit", async function(e){
    e.preventDefault();
    if(selectedItems.length === 0) return alert("Sélectionnez au moins un produit !");

    const nomClient = document.getElementById("fullname").value;
    const phoneClient = document.getElementById("phone").value;

    const { error } = await supabaseClient.from("paiements").insert([{
        produit: selectedItems.map(i => i.nom).join(", "),
        prix: totalGlobal,
        fullname: nomClient,
        phone: phoneClient,
        operator: document.getElementById("operator").value
    }]);

    if (error) {
        alert("Erreur : " + error.message);
    } else {
        // AFFICHAGE DU MESSAGE DE SUCCÈS SANS QUITTER LA PAGE
        document.getElementById("confirmationMessage").innerText = 
            `Merci ${nomClient}, votre paiement de ${totalGlobal}$ a été effectué avec succès !`;
        document.getElementById("confirmationOverlay").style.display = "flex";
        this.reset();
    }
});

// Après le succès du paiement dans la fonction existante
if (!error) {
    localStorage.removeItem('monPanier'); // Vide le panier localement
    panier = [];
    majBadgePanier(); // Met à jour le compteur à 0
    document.getElementById("confirmationMessage").innerText = "Paiement réussi !";
}
</script>
</body>
</html>
